# Open-source projects, newest first.
# Stars, forks and language are pulled live from the GitHub API at page load
# (assets/js/github-stats.js). Maintain title, description, tags, ribbon, link.
# `ribbon` is optional: "Latest" (blue), "Featured" (gold), "Archived" (grey).
- title: "BrowserSnatch"
  description: "This project steals important data from all chromium and gecko browsers installed in the system and gather the data in a stealer db to be exfiltrated out"
  tags: [infostealer, windows, maldev]
  ribbon: "Latest"
  link: "https://github.com/shaddy43/BrowserSnatch"

- title: "MalwareAnalysisSeries"
  description: "This repository contains the analysis reports, technical details or any tools created for analyzing a piece of malware sample. Additionally, the repo also contains interesting TTPs extracted and recreated from malware samples with detection rules"
  tags: [reversing, dfir, cracking]
  ribbon: "Featured"
  link: "https://shaddy43.github.io/MalwareAnalysisSeries/"

- title: "Position Independent Backdoor"
  description: "This project contains methodology of creating position independent code which can be used to extract shellcode from the generated binary. Shellcode could be injected in any process for evading defenses"
  tags: [shellcode, evasion]
  link: "https://github.com/shaddy43/Position_Independent_Backdoor"

- title: "Reverse Shell Netcat"
  description: "This repository contains a program that gives remote shell connection on the sockets back to the c2 server. This connection can be listened on Netcat as well"
  tags: [c2, redteam]
  link: "https://github.com/shaddy43/ReverseShell_NC"

- title: "Donut Injector"
  description: "An injector that tries to bypass static and dynamic analysis. The shellcodes that are injected must be encrypted with a key and decrypted at runtime to avoid detection"
  tags: [injector, evasion]
  link: "https://github.com/shaddy43/Donut_Injector"

- title: "Pocket Encrypter"
  description: "A light-weight Pocket encrypter using CBC AES 256 for encrypting files with password being passed as a parameter"
  tags: [crypto, aes]
  link: "https://github.com/shaddy43/PocketEncryptor"

- title: "AES Shellcode Encrypter"
  description: "A tool that can encrypt all type of files and give the encrypted output in the form of an encrypted shellcode"
  tags: [shellcode, aes]
  link: "https://github.com/shaddy43/AES_Shellcode_Encryptor"

- title: "SGCApp: Secure Group Communication"
  description: "This repository implements SEGCOM paper to achieve secure group communication in multi-casting"
  tags: [security, networking, media]
  ribbon: "Archived"
  link: "https://github.com/shaddy43/SGCApp"
